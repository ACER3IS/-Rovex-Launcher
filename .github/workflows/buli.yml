name: Build Rovex Launcher

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build launcher
        run: npm run build

      - name: Create ZIP
        run: Compress-Archive -Path dist/*.exe -DestinationPath RovexLauncher.zip

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: RovexLauncher
          path: RovexLauncher.zip
